services:
  postgres:
    image: postgres:15
    container_name: dal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dal:
    image: python:3.12-slim
    container_name: dal_api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    command: /bin/sh -c "pip install -r requirements-test.txt uvicorn[standard] && uvicorn dal_service.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
